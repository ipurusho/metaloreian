services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metaloreian
      POSTGRES_USER: metaloreian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metaloreian_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaloreian"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://metaloreian:${POSTGRES_PASSWORD:-metaloreian_dev}@postgres:5432/metaloreian?sslmode=disable
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?Set SPOTIFY_CLIENT_ID in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
