name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      heavyml_version:
        description: 'heavyML release tag to load embeddings from (e.g., v2.0.0). Leave empty to skip.'
        required: false
        default: ''

permissions: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test -v -count=1 ./...

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_SPOTIFY_CLIENT_ID=${{ vars.VITE_SPOTIFY_CLIENT_ID }}
          cache-from: |
            type=gha,scope=build-${{ github.sha }}
            type=gha,scope=build-main
          cache-to: type=gha,mode=max,scope=build-${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          echo 'SSH_OPTS=-o StrictHostKeyChecking=yes -o ConnectTimeout=10' >> "$GITHUB_ENV"

      - name: Copy config files to VM
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          scp ${SSH_OPTS} -i ~/.ssh/deploy_key -r \
            docker-compose.prod.yml nginx.conf backend/migrations \
            "${VM_USER}@${VM_HOST}:~/app/"

      - name: Write .env to VM
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          SSH="ssh ${SSH_OPTS} -i ~/.ssh/deploy_key ${VM_USER}@${VM_HOST}"
          ${SSH} "mkdir -p ~/app/backend/migrations"
          printf 'POSTGRES_PASSWORD=%s\nSPOTIFY_CLIENT_ID=%s\nFRONTEND_URL=%s\nDUCKDNS_TOKEN=%s\n' \
            "${POSTGRES_PASSWORD}" "${SPOTIFY_CLIENT_ID}" "${FRONTEND_URL}" "${DUCKDNS_TOKEN}" | \
            ${SSH} "umask 077 && cat > ~/app/.env"

      - name: Deploy containers on VM
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          SSH="ssh ${SSH_OPTS} -i ~/.ssh/deploy_key ${VM_USER}@${VM_HOST}"
          ${SSH} "cd ~/app && \
            docker compose -f docker-compose.prod.yml pull backend && \
            docker compose -f docker-compose.prod.yml up -d && \
            docker image prune -f --filter 'label=org.opencontainers.image.source'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts

  # ------------------------------------------------------------------
  # Manual: Load new heavyML embeddings into production pgvector
  # Trigger via: Actions → Build and Deploy → Run workflow → enter version
  # ------------------------------------------------------------------
  load-embeddings:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.heavyml_version != ''
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          echo 'SSH_OPTS=-o StrictHostKeyChecking=yes -o ConnectTimeout=10' >> "$GITHUB_ENV"

      - name: Download embeddings from heavyML release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAVYML_VERSION: ${{ github.event.inputs.heavyml_version }}
        run: |
          gh release download "${HEAVYML_VERSION}" \
            --repo ipurusho/heavyML \
            --pattern "load_embeddings.sql" \
            --dir /tmp
          echo "Downloaded load_embeddings.sql from heavyML ${HEAVYML_VERSION}"
          wc -l /tmp/load_embeddings.sql

      - name: Load embeddings into production pgvector
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          SSH="ssh ${SSH_OPTS} -i ~/.ssh/deploy_key ${VM_USER}@${VM_HOST}"
          scp ${SSH_OPTS} -i ~/.ssh/deploy_key \
            /tmp/load_embeddings.sql "${VM_USER}@${VM_HOST}:/tmp/load_embeddings.sql"
          ${SSH} "cd ~/app && \
            docker exec -i \$(docker compose -f docker-compose.prod.yml ps -q postgres) \
              psql -U metaloreian -d metaloreian < /tmp/load_embeddings.sql && \
            rm /tmp/load_embeddings.sql"
          echo "Embeddings loaded successfully"

      - name: Verify embeddings
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          SSH="ssh ${SSH_OPTS} -i ~/.ssh/deploy_key ${VM_USER}@${VM_HOST}"
          ${SSH} "cd ~/app && \
            docker exec \$(docker compose -f docker-compose.prod.yml ps -q postgres) \
              psql -U metaloreian -d metaloreian -c 'SELECT count(*) FROM band_embeddings;'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
